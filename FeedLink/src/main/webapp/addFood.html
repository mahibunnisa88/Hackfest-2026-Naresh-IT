<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f6fb;
        }

        .main-card{
            border:none;
            border-radius:18px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            background:#ffffff;
        }

        .title{
            color:#5f7fb3;
            font-weight:700;
        }

        .submit-btn{
            background:#cfe2ff;
            border:none;
            color:#2c5aa0;
            font-weight:600;
        }

        .submit-btn:hover{
            background:#b6d4fe;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card main-card p-4">
                <h2 class="text-center title mb-4">Add Food</h2>

                <div id="successBox"></div>

                <form action="addFood" method="post">
                    <div class="mb-3">
                        <label class="form-label">Food Name</label>
                        <input type="text" name="foodName" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="text" name="quantity" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Expires In Hours</label>
                        <input type="number" name="expires" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="3" required></textarea>
                    </div>

                    <button type="submit" class="btn submit-btn w-100">Add Food</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if (msg) {
        document.getElementById("successBox").innerHTML =
            '<div class="alert alert-success text-center fw-bold">' + msg + '</div>';

        window.history.replaceState({}, document.title, "addFood.html");
    }
</script>

</body>
</html>
